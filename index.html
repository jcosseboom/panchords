<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handpan Chord Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(145deg, #f0f1f4 0%, #e4e6eb 100%);
    font-family: Georgia, Palatino, serif;
    padding: 24px 16px;
  }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-size: 26px; font-weight: 700; color: #2c3340; text-align: center; }
  .sub { font-size: 13px; color: #6b7585; text-align: center; margin: 6px 0 24px; }
  .model-select {
    display: block; margin: 0 auto 20px; padding: 7px 14px; border-radius: 6px;
    border: 1px solid #bcc2cc; font-size: 13px; font-family: Georgia, Palatino, serif;
    background: #fff; color: #3c4250; cursor: pointer; outline: none;
  }
  .chords { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .chords button {
    padding: 7px 16px; border-radius: 6px; font-size: 13px;
    font-family: Georgia, Palatino, serif; cursor: pointer;
    border: 1px solid #bcc2cc; background: #fff; color: #3c4250; font-weight: 500;
    transition: all 0.15s ease;
  }
  .chords button.active {
    border: 2px solid #3b7dd8; background: #3b7dd8; color: #fff; font-weight: 700;
  }
.dia-wrap {
    background: #fff; border-radius: 12px; padding: 16px 8px 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .dia-wrap img { display: block; width: 100%; max-width: 560px; margin: 0 auto; height: auto; }
  .actions { text-align: center; margin-top: 16px; }
  .actions button {
    padding: 9px 24px; border-radius: 6px; border: 1px solid #3b7dd8;
    background: #fff; color: #3b7dd8; font-size: 13px; cursor: pointer;
    font-family: Georgia, Palatino, serif; font-weight: 600; margin: 0 6px;
  }
  .notes-list { text-align: center; margin-top: 14px; font-size: 13px; color: #6b7585; }
  .notes-list strong { color: #3b7dd8; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Handpan Chord Diagram</h1>
  <p class="sub" id="subtitle">Select a model and chord to highlight notes</p>
  <select class="model-select" id="modelSelect"></select>
  <div class="chords" id="chordBtns"></div>
<div class="dia-wrap" id="dia"></div>
  <div class="actions">
    <button onclick="exportSVG()">Export SVG</button>
    <button onclick="exportPNG()">Export PNG</button>
  </div>
  <div class="notes-list" id="notesList"></div>
</div>

<script>
// ── SCALE REGISTRY ───────────────────────────────────────
// Each entry: { file, label }. Add new models here.
const MODELS = [
  { file: "scales/a-integral-9.json", label: "A Integral 9 — Rav Vast" },
  { file: "scales/b-kurd-10.json", label: "B Kurd 10 — Rav Vast" },
  { file: "scales/c-ashakiran-17.json", label: "C Ashakiran 17 — Ayasa" },
  { file: "scales/d-ashakiran-19.json", label: "D Ashakiran 19 — Ayasa" },
  { file: "scales/d-celtic-minor-9.json", label: "D Celtic Minor 9 — NovaPan" },
  { file: "scales/d-kurd-10.json", label: "D Kurd 10 — Makai" },
  { file: "scales/d-major-9.json", label: "D Major 9 — Rav Vast" },
  { file: "scales/e-amara-20.json", label: "E Amara 20 — Ayasa" },
  { file: "scales/f-sharp-pygmy-21.json", label: "F# Pygmy 21 — Mag" },
  { file: "scales/f-sharp-romanian-hijaz-20.json", label: "F# Romanian Hijaz 20 — Yishama" },
  { file: "scales/g-hijaz-19.json", label: "G Hijaz 19 — Ziran" },
  { file: "scales/g-pygmy-9.json", label: "G Pygmy 9 — Rav Vast" },
];

// ── NOTE UTILITIES ───────────────────────────────────────
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT_MAP = { "Db":"C#","Eb":"D#","Fb":"E","Gb":"F#","Ab":"G#","Bb":"A#","Cb":"B" };

function noteToMidi(name) {
  const match = name.match(/^([A-G][#b]?)(\d+)$/);
  if (!match) return 60;
  const noteName = FLAT_MAP[match[1]] || match[1];
  const semitone = NOTE_NAMES.indexOf(noteName);
  const octave = parseInt(match[2]);
  return (octave + 1) * 12 + semitone;
}

// ── LAYOUT ENGINE ────────────────────────────────────────
const CX = 310, CY = 320;
const R_MAX = 32, R_MIN = 22, DING_R = 44, BOTTOM_DING_R = 38;

function clock(h) { return ((h * 30 - 90) * Math.PI) / 180; }
function pos(r, a) { return { x: Math.round(CX + r * Math.cos(a)), y: Math.round(CY + r * Math.sin(a)) }; }

function buildLayout(scale) {
  const radii = scale.ringRadii;
  const drop = scale.dingDrop || 18;
  const bottomDings = new Set(scale.bottomDings || []);
  const layout = {};

  // Ding — always centered with drop offset
  layout[scale.ding + "_ding"] = { x: CX, y: CY + drop };

  for (const n of scale.notes) {
    const r = radii[n.ring];
    const p = pos(r, clock(n.clock));
    // Middle ring notes get the ding drop offset
    if (n.ring === "middle") p.y += drop;
    layout[n.note + "_" + n.num] = p;
  }

  // Compute pitch range for note sizing
  const allNotes = [scale.ding, ...scale.notes.map(n => n.note)];
  const midis = allNotes.map(noteToMidi);
  const pitchMin = Math.min(...midis);
  const pitchMax = Math.max(...midis);

  return { layout, pitchMin, pitchMax, bottomDings, drop };
}

function getNoteRadius(note, isDing, scaleCtx) {
  if (isDing) return DING_R;
  if (scaleCtx.bottomDings.has(note)) return BOTTOM_DING_R;
  const midi = noteToMidi(note);
  const t = (midi - scaleCtx.pitchMin) / (scaleCtx.pitchMax - scaleCtx.pitchMin || 1);
  return Math.round(R_MAX - t * (R_MAX - R_MIN));
}

// ── COLOR PALETTE ────────────────────────────────────────
const P = {
  shell:"#d4d8df",shellS:"#b8bec8",top:"#c5cbd5",topS:"#a8b0bc",
  note:"#eaecf0",noteS:"#b0b6c0",txt:"#5a6270",num:"#8890a0",
  hi:"#3b7dd8",hiGlow:"#5a9cf0",hiTxt:"#fff",hiS:"#2a5faa",
  hiRoot:"#6ba3e8",hiRootS:"#4a80c0",hiRootGlow:"#8bbaf0",
  ding:"#dde0e6",dingS:"#a8adb8",bg:"#f5f6f8",title:"#2c3340",sub:"#6b7585",
};

// ── STATE ────────────────────────────────────────────────
let currentScale = null;   // the loaded JSON object
let scaleCtx = null;       // computed layout + pitch range
let selectedChord = null;

// ── RENDER ───────────────────────────────────────────────
function buildSVG(scale, ctx, chordName) {
  const W = 620, H = 690;
  const chords = { ...scale.chords, "None": [] };
  const hlSet = new Set(chords[chordName] || []);
  const rootMatch = chordName.match(/^([A-G][#b]?)/);
  const rootPitch = rootMatch ? rootMatch[1] : null;
  const title = chordName !== "None" ? chordName + " Chord" : scale.name;
  const subtitle = scale.name + " — " + scale.manufacturer;
  const shell = scale.shellDimensions;

  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<rect width="${W}" height="${H}" fill="${P.bg}" rx="12"/>`;
  svg += `<ellipse cx="${CX}" cy="${CY}" rx="${shell.outer.rx}" ry="${shell.outer.ry}" fill="${P.shell}" stroke="${P.shellS}" stroke-width="1.5"/>`;
  svg += `<ellipse cx="${CX}" cy="${CY}" rx="${shell.inner.rx}" ry="${shell.inner.ry}" fill="${P.top}" stroke="${P.topS}" stroke-width="1.2"/>`;

  // Build note list: all tone fields + the ding
  const noteEntries = [
    ...scale.notes.map(n => ({ note: n.note, num: n.num, isDing: false })),
    { note: scale.ding, num: null, isDing: true },
  ];

  for (const n of noteEntries) {
    const key = n.isDing ? n.note + "_ding" : n.note + "_" + n.num;
    const p = ctx.layout[key];
    if (!p) continue;
    const r = getNoteRadius(n.note, n.isDing, ctx);
    const hit = hlSet.has(n.note);
    const notePitch = n.note.replace(/\d+$/, "");
    const isRoot = hit && rootPitch && notePitch === rootPitch;
    const fill = hit ? (isRoot ? P.hiRoot : P.hi) : n.isDing ? P.ding : P.note;
    const stroke = hit ? (isRoot ? P.hiRootS : P.hiS) : n.isDing ? P.dingS : P.noteS;
    const sw = hit ? 2 : 1.2;
    const txtC = hit ? P.hiTxt : P.txt;
    const numC = hit ? "rgba(255,255,255,0.7)" : P.num;
    const nfs = Math.max(11.3, r * 0.42);
    const nmfs = Math.max(12, r * 0.32);
    const gap = r * 0.30;
    const noteLabel = n.isDing ? scale.ding : n.note;
    const numLabel = n.isDing ? "D" : n.num;

    if (hit) {
      svg += `<circle cx="${p.x}" cy="${p.y}" r="${r+4}" fill="none" stroke="${isRoot ? P.hiRootGlow : P.hiGlow}" stroke-width="2" opacity="0.45"/>`;
    }
    svg += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    svg += `<text x="${p.x}" y="${p.y - gap*0.5}" text-anchor="middle" dominant-baseline="central" fill="${txtC}" font-size="${nfs}" font-family="Georgia,Palatino,serif" font-weight="${hit?700:500}">${noteLabel}</text>`;
    svg += `<text x="${p.x}" y="${p.y + gap*1.2}" text-anchor="middle" dominant-baseline="central" fill="${numC}" font-size="${nmfs}" font-family="Georgia,Palatino,serif" font-weight="400">${numLabel}</text>`;
  }

  svg += `<text x="${CX}" y="${H-44}" text-anchor="middle" fill="${P.title}" font-size="20" font-family="Georgia,Palatino,serif" font-weight="700" letter-spacing="0.5">${title}</text>`;
  svg += `<text x="${CX}" y="${H-22}" text-anchor="middle" fill="${P.sub}" font-size="12" font-family="Georgia,Palatino,serif">${subtitle}</text>`;
  svg += `</svg>`;
  return svg;
}

function render() {
  if (!currentScale || !scaleCtx) return;
  const svgStr = buildSVG(currentScale, scaleCtx, selectedChord);
  const dataUri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgStr);
  document.getElementById("dia").innerHTML = `<img src="${dataUri}" alt="Handpan chord diagram">`;
  const chords = { ...currentScale.chords, "None": [] };
  const notes = chords[selectedChord] || [];
  document.getElementById("notesList").innerHTML = notes.length
    ? `<strong>${selectedChord}:</strong> ${notes.join(" — ")}`
    : "";
  document.querySelectorAll(".chords button").forEach(b => {
    b.classList.toggle("active", b.dataset.chord === selectedChord);
  });
}

function selectChord(name) { selectedChord = name; render(); }

// ── MODEL LOADING ────────────────────────────────────────
async function loadScale(file) {
  const resp = await fetch(file);
  const scale = await resp.json();
  currentScale = scale;
  scaleCtx = buildLayout(scale);

  // Update subtitle
  document.getElementById("subtitle").textContent =
    scale.name + " — " + scale.manufacturer + " — Select a chord to highlight notes";

  // Rebuild chord buttons
  const container = document.getElementById("chordBtns");
  container.innerHTML = "";
  const chordNames = ["None", ...Object.keys(scale.chords)];
  for (const name of chordNames) {
    const b = document.createElement("button");
    b.textContent = name;
    b.dataset.chord = name;
    b.onclick = () => selectChord(name);
    container.appendChild(b);
  }

  // Default to None
  selectedChord = "None";
  render();
}

// ── EXPORT ───────────────────────────────────────────────
function exportSVG() {
  if (!currentScale || !scaleCtx) return;
  const svgStr = buildSVG(currentScale, scaleCtx, selectedChord);
  const blob = new Blob([svgStr], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `handpan-${selectedChord.replace(/[^a-zA-Z0-9]/g, "")}.svg`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportPNG() {
  if (!currentScale || !scaleCtx) return;
  const svgStr = buildSVG(currentScale, scaleCtx, selectedChord);
  const scale = 3;
  const canvas = document.createElement("canvas");
  canvas.width = 620 * scale;
  canvas.height = 690 * scale;
  const ctx = canvas.getContext("2d");
  const img = new Image();
  const blob = new Blob([svgStr], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  img.onload = function () {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = `handpan-${selectedChord.replace(/[^a-zA-Z0-9]/g, "")}.png`;
    a.click();
  };
  img.src = url;
}

// ── INIT ─────────────────────────────────────────────────
const modelSelect = document.getElementById("modelSelect");
for (const m of MODELS) {
  const opt = document.createElement("option");
  opt.value = m.file;
  opt.textContent = m.label;
  modelSelect.appendChild(opt);
}
modelSelect.addEventListener("change", () => loadScale(modelSelect.value));

// Load first model
loadScale(MODELS[0].file);
</script>
<script data-goatcounter="https://jcosseboom.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
