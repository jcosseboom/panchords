<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handpan Note Positioning Tool</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #1a1d24;
    font-family: Georgia, Palatino, serif;
    color: #ccc;
    display: flex;
  }
  .sidebar {
    width: 320px; min-width: 320px;
    background: #22262e;
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid #333;
    display: flex; flex-direction: column; gap: 16px;
  }
  h1 { font-size: 18px; color: #e0e0e0; }
  .sub { font-size: 12px; color: #888; margin-top: 4px; }
  label { font-size: 12px; color: #999; display: block; margin-bottom: 4px; }
  select, button {
    width: 100%; padding: 8px 12px; border-radius: 6px;
    font-family: Georgia, Palatino, serif; font-size: 13px;
    border: 1px solid #444; background: #2a2e36; color: #ddd;
    cursor: pointer; outline: none;
  }
  button { background: #3b7dd8; color: #fff; border-color: #3b7dd8; font-weight: 600; }
  button:hover { background: #4a8be8; }
  button.secondary { background: #2a2e36; color: #ddd; border-color: #444; }
  button.secondary:hover { background: #333840; }
  .positions-table {
    font-size: 12px; width: 100%; border-collapse: collapse;
  }
  .positions-table th {
    text-align: left; padding: 4px 8px; color: #888;
    border-bottom: 1px solid #333; font-weight: 500;
  }
  .positions-table td {
    padding: 4px 8px; border-bottom: 1px solid #2a2e36;
  }
  .positions-table tr.dragging { background: #2a3a50; }
  .positions-table .clock-val { color: #5a9cf0; font-weight: 600; font-family: monospace; }
  .canvas-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 20px; position: relative;
  }
  .canvas-area svg {
    max-width: 100%; max-height: calc(100vh - 40px);
    cursor: default;
  }
  .note-circle { cursor: grab; }
  .note-circle:active { cursor: grabbing; }
  .note-circle.dragging { filter: brightness(1.3); }
  .clock-label {
    font-size: 10px; fill: #5a9cf0; font-family: monospace;
    pointer-events: none;
  }
  .ring-guide { fill: none; stroke: #444; stroke-width: 1; stroke-dasharray: 4,4; }
  .copied-toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #3b7dd8; color: #fff; padding: 10px 24px; border-radius: 8px;
    font-size: 13px; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .copied-toast.show { opacity: 1; }
  .ref-controls { display: flex; gap: 8px; align-items: center; }
  .ref-controls input[type="range"] { flex: 1; }
  .ref-controls span { font-size: 11px; color: #888; min-width: 30px; }
</style>
</head>
<body>
<div class="sidebar">
  <div>
    <h1>Note Positioning Tool</h1>
    <p class="sub">Drag notes around their ring to set clock positions. Copy the result into your scale JSON.</p>
  </div>

  <div>
    <label>Scale File</label>
    <select id="scaleSelect"></select>
  </div>

  <div>
    <label>Reference Image Overlay</label>
    <div class="ref-controls">
      <button class="secondary" id="refToggle" onclick="toggleRef()">Show</button>
      <input type="range" id="refOpacity" min="0" max="100" value="40" oninput="updateRefOpacity()">
      <span id="refOpacityLabel">40%</span>
    </div>
  </div>

  <div>
    <label>Note Positions</label>
    <table class="positions-table">
      <thead><tr><th>Note</th><th>#</th><th>Ring</th><th>Clock</th></tr></thead>
      <tbody id="positionsBody"></tbody>
    </table>
  </div>

  <div style="margin-top:auto; display:flex; flex-direction:column; gap:8px;">
    <button onclick="copyPositions()">Copy Positions JSON</button>
    <button class="secondary" onclick="copyFullScale()">Copy Full Scale JSON</button>
  </div>
</div>

<div class="canvas-area">
  <svg id="canvas" viewBox="0 0 620 690" width="620" height="690" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="copied-toast" id="toast">Copied to clipboard!</div>

<script>
const CX = 310, CY = 320;
const DING_R = 44, BOTTOM_DING_R = 38, R_MAX = 32, R_MIN = 22;
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT_MAP = {"Db":"C#","Eb":"D#","Fb":"E","Gb":"F#","Ab":"G#","Bb":"A#","Cb":"B"};

const SCALE_FILES = [
{ file: "scales/d-kurd-10.json", label: "D Kurd 10" },
  { file: "scales/e-amara-20.json", label: "E Amara 20" },
  { file: "scales/f-sharp-pygmy-21.json", label: "F# Pygmy 21" },
  { file: "scales/f-sharp-romanian-hijaz-20.json", label: "F# Romanian Hijaz 20" },
  { file: "scales/g-hijaz-19.json", label: "G Hijaz 19" },
  { file: "scales/d-celtic-minor-9.json", label: "D Celtic Minor 9" },
  { file: "scales/d-major-9.json", label: "D Major 9" },
  { file: "scales/g-pygmy-9.json", label: "G Pygmy 9" },
  { file: "scales/d-ashakiran-19.json", label: "D Ashakiran 19" },
  { file: "scales/c-ashakiran-17.json", label: "C Ashakiran 17" },
  { file: "scales/a-integral-9.json", label: "A Integral 9" },
  { file: "scales/b-kurd-10.json", label: "B Kurd 10" },
];

const REF_IMAGES = {
"scales/d-kurd-10.json": "reference/Makai D Kurd 10.png",
  "scales/e-amara-20.json": "reference/Ayasa E Amara 20.png",
  "scales/f-sharp-pygmy-21.json": "reference/mag-f-sharp-pygmy-21.png",
};

let scale = null;
let noteStates = []; // { note, num, ring, clock, x, y, r }
let dingState = null;
let dragging = null;
let showRef = false;

function noteToMidi(name) {
  const match = name.match(/^([A-G][#b]?)(\d+)$/);
  if (!match) return 60;
  const n = FLAT_MAP[match[1]] || match[1];
  return (parseInt(match[2]) + 1) * 12 + NOTE_NAMES.indexOf(n);
}

function clockToAngle(h) { return ((h * 30 - 90) * Math.PI) / 180; }
function angleToClock(a) {
  let deg = (a * 180 / Math.PI + 90 + 360) % 360;
  return Math.round(deg / 30 * 100) / 100; // round to 2 decimals
}
function pos(r, clockH) {
  const a = clockToAngle(clockH);
  return { x: Math.round(CX + r * Math.cos(a)), y: Math.round(CY + r * Math.sin(a)) };
}

function getNoteRadius(note, isDing) {
  if (isDing) return DING_R;
  if (scale && (scale.bottomDings || []).includes(note)) return BOTTOM_DING_R;
  const midis = [scale.ding, ...scale.notes.map(n => n.note)].map(noteToMidi);
  const pMin = Math.min(...midis), pMax = Math.max(...midis);
  const t = (noteToMidi(note) - pMin) / (pMax - pMin || 1);
  return Math.round(R_MAX - t * (R_MAX - R_MIN));
}

// ── RENDERING ─────────────────────────────────────────
function renderSVG() {
  const svg = document.getElementById("canvas");
  const drop = scale.dingDrop || 18;
  const shell = scale.shellDimensions;
  const radii = scale.ringRadii;

  let html = `<rect width="620" height="690" fill="#f5f6f8" rx="12"/>`;

  // Shell
  html += `<ellipse cx="${CX}" cy="${CY}" rx="${shell.outer.rx}" ry="${shell.outer.ry}" fill="#d4d8df" stroke="#b8bec8" stroke-width="1.5"/>`;
  html += `<ellipse cx="${CX}" cy="${CY}" rx="${shell.inner.rx}" ry="${shell.inner.ry}" fill="#c5cbd5" stroke="#a8b0bc" stroke-width="1.2"/>`;

  // Ring guides (dashed circles showing each ring)
  for (const [ringName, r] of Object.entries(radii)) {
    html += `<circle cx="${CX}" cy="${CY}" r="${r}" class="ring-guide"/>`;
  }

  // Ding
  const dingR = DING_R;
  const dingX = CX, dingY = CY + drop;
  dingState = { note: scale.ding, x: dingX, y: dingY, r: dingR };
  html += `<circle cx="${dingX}" cy="${dingY}" r="${dingR}" fill="#dde0e6" stroke="#a8adb8" stroke-width="1.2"/>`;
  html += `<text x="${dingX}" y="${dingY - 5}" text-anchor="middle" dominant-baseline="central" fill="#5a6270" font-size="14" font-family="Georgia,Palatino,serif" font-weight="500">${scale.ding}</text>`;
  html += `<text x="${dingX}" y="${dingY + 12}" text-anchor="middle" dominant-baseline="central" fill="#8890a0" font-size="12" font-family="Georgia,Palatino,serif">D</text>`;

  // Notes
  for (let i = 0; i < noteStates.length; i++) {
    const ns = noteStates[i];
    const r = radii[ns.ring];
    const p = pos(r, ns.clock);
    if (ns.ring === "middle") p.y += drop;
    ns.x = p.x;
    ns.y = p.y;
    ns.r = getNoteRadius(ns.note, false);

    const isActive = dragging === i;
    const fill = isActive ? "#3b7dd8" : "#eaecf0";
    const stroke = isActive ? "#2a5faa" : "#b0b6c0";
    const txtFill = isActive ? "#fff" : "#5a6270";

    html += `<circle cx="${p.x}" cy="${p.y}" r="${ns.r}" fill="${fill}" stroke="${stroke}" stroke-width="${isActive?2:1.2}"
      class="note-circle${isActive?' dragging':''}" data-idx="${i}"/>`;
    const nfs = Math.max(11.3, ns.r * 0.42);
    const nmfs = Math.max(12, ns.r * 0.32);
    const gap = ns.r * 0.30;
    html += `<text x="${p.x}" y="${p.y - gap*0.5}" text-anchor="middle" dominant-baseline="central" fill="${txtFill}" font-size="${nfs}" font-family="Georgia,Palatino,serif" font-weight="500" pointer-events="none">${ns.note}</text>`;
    html += `<text x="${p.x}" y="${p.y + gap*1.2}" text-anchor="middle" dominant-baseline="central" fill="${isActive?'rgba(255,255,255,0.7)':'#8890a0'}" font-size="${nmfs}" font-family="Georgia,Palatino,serif" pointer-events="none">${ns.num}</text>`;

    // Clock label outside the note
    const labelR = r + ns.r + 14;
    const la = clockToAngle(ns.clock);
    const lx = CX + labelR * Math.cos(la);
    let ly = CY + labelR * Math.sin(la);
    if (ns.ring === "middle") ly += drop;
    html += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" class="clock-label">${ns.clock.toFixed(2)}</text>`;
  }

  // Title area
  html += `<text x="${CX}" y="646" text-anchor="middle" fill="#2c3340" font-size="20" font-family="Georgia,Palatino,serif" font-weight="700">${scale.name}</text>`;
  html += `<text x="${CX}" y="668" text-anchor="middle" fill="#6b7585" font-size="12" font-family="Georgia,Palatino,serif">Drag notes to position — clock values shown</text>`;

  // Reference image overlay (on top of everything, pointer-events none so notes are still draggable)
  const refSrc = REF_IMAGES[document.getElementById("scaleSelect").value];
  if (refSrc && showRef) {
    const opacity = document.getElementById("refOpacity").value / 100;
    html += `<image href="${refSrc}" x="30" y="30" width="560" height="560"
      opacity="${opacity}" preserveAspectRatio="xMidYMid meet" pointer-events="none"/>`;
  }

  svg.innerHTML = html;
  updateTable();
}

function updateTable() {
  const tbody = document.getElementById("positionsBody");
  tbody.innerHTML = noteStates.map((ns, i) =>
    `<tr class="${dragging === i ? 'dragging' : ''}">
      <td>${ns.note}</td>
      <td>${ns.num}</td>
      <td>${ns.ring}</td>
      <td class="clock-val">${ns.clock.toFixed(2)}</td>
    </tr>`
  ).join("");
}

// ── DRAGGING ──────────────────────────────────────────
function getSVGPoint(e) {
  const svg = document.getElementById("canvas");
  const rect = svg.getBoundingClientRect();
  const scaleX = 620 / rect.width;
  const scaleY = 690 / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

document.addEventListener("mousedown", (e) => {
  const circle = e.target.closest(".note-circle");
  if (!circle) return;
  dragging = parseInt(circle.dataset.idx);
  renderSVG();
  e.preventDefault();
});

document.addEventListener("mousemove", (e) => {
  if (dragging === null) return;
  const pt = getSVGPoint(e);
  const ns = noteStates[dragging];
  const drop = (ns.ring === "middle") ? (scale.dingDrop || 18) : 0;
  const dx = pt.x - CX;
  const dy = pt.y - (CY + drop);
  const angle = Math.atan2(dy, dx);
  ns.clock = angleToClock(angle);
  renderSVG();
  e.preventDefault();
});

document.addEventListener("mouseup", () => {
  if (dragging !== null) {
    dragging = null;
    renderSVG();
  }
});

// ── SCALE LOADING ─────────────────────────────────────
async function loadScale(file) {
  const resp = await fetch(file);
  scale = await resp.json();
  noteStates = scale.notes.map(n => ({
    note: n.note, num: n.num, ring: n.ring, clock: n.clock,
  }));
  renderSVG();
}

// ── REFERENCE IMAGE ───────────────────────────────────
function toggleRef() {
  showRef = !showRef;
  document.getElementById("refToggle").textContent = showRef ? "Hide" : "Show";
  renderSVG();
}
function updateRefOpacity() {
  const val = document.getElementById("refOpacity").value;
  document.getElementById("refOpacityLabel").textContent = val + "%";
  if (showRef) renderSVG();
}

// ── EXPORT ────────────────────────────────────────────
function copyPositions() {
  const data = noteStates.map(ns => ({
    note: ns.note, num: ns.num, ring: ns.ring, clock: parseFloat(ns.clock.toFixed(2)),
  }));
  navigator.clipboard.writeText(JSON.stringify(data, null, 2));
  showToast("Positions JSON copied!");
}

function copyFullScale() {
  const updated = { ...scale };
  updated.notes = noteStates.map(ns => ({
    note: ns.note, num: ns.num, ring: ns.ring, clock: parseFloat(ns.clock.toFixed(2)),
  }));
  navigator.clipboard.writeText(JSON.stringify(updated, null, 2));
  showToast("Full scale JSON copied!");
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

// ── INIT ──────────────────────────────────────────────
const sel = document.getElementById("scaleSelect");
for (const s of SCALE_FILES) {
  const opt = document.createElement("option");
  opt.value = s.file;
  opt.textContent = s.label;
  sel.appendChild(opt);
}
sel.addEventListener("change", () => loadScale(sel.value));

// Default to D Kurd since that's what we're positioning
sel.value = "scales/g-hijaz-19.json";
loadScale("scales/g-hijaz-19.json");
</script>
</body>
</html>
